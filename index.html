<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Treasure Manager</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<header>

    <h1>💰 Treasure Manager</h1>

    <p>Live Financial Dashboard</p>

    <div class="nav-links">

        <a href="index.html">🏠 Dashboard</a>

        <a href="members.html">👥 Members</a>

        <a href="expenses.html">💰 Expenses</a>

        <a href="yatra.html">🛕 Yatra</a>

    </div>

</header>

<div class="container">

    <div class="dashboard-grid">

    <div class="dashboard-card">
        <div class="icon">👥</div>
        <h3>Total Members</h3>
        <h2 id="members">0</h2>
    </div>

    <div class="dashboard-card">
        <div class="icon">💰</div>
        <h3>Total Collection</h3>
        <h2 id="collection">₹0</h2>
    </div>

    <div class="dashboard-card">
        <div class="icon">💸</div>
        <h3>Total Expenses</h3>
        <h2 id="expenses">₹0</h2>
    </div>

    <div class="dashboard-card">
        <div class="icon">💵</div>
        <h3>Cash Available</h3>
        <h2 id="balance">₹0</h2>
    </div>

    <div class="dashboard-card">
        <div class="icon">🏦</div>
        <h3>Last Year Balance</h3>
        <h2 id="lastyear">₹0</h2>
    </div>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
