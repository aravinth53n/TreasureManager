    <link rel="stylesheet" href="style.css">

</head>

<body>

    <header class="page-header">

        <h1>💰 Expenses</h1>

        <div class="nav-links">

            <a href="members.html">👥 Members</a>

            <a href="expenses.html">💰 Expenses</a>

    <section class="split-card">

        <h2>Expense Split</h2>

        <table id="expenseSplit">

    <!-- Expense Cards -->

    <section class="expense-grid">

        <div class="expense-card">

            <h3>🍛 Food</h3>

            <div id="foodList"></div>

            <div class="card-total" id="foodTotal"></div>

        </div>


        <div class="expense-card">

            <h3>🚌 Travel</h3>

            <div id="travelList"></div>

            <div class="card-total" id="travelTotal"></div>

        </div>


        <div class="expense-card">

            <h3>🪔 Pooja Items</h3>

            <div id="poojaList"></div>

            <div class="card-total" id="poojaTotal"></div>

        </div>


        <div class="expense-card">

            <h3>🛕 Temple Expenses</h3>

            <div id="templeList"></div>

            <div class="card-total" id="templeTotal"></div>

        </div>


        <div class="expense-card">

            <h3>📦 Miscellaneous</h3>

            <div id="miscList"></div>

            <div class="card-total" id="miscTotal"></div>

        </div>

    </section>


    <script src="expenses.js"></script>
